<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Heart/pulse icon -->
  <g transform="translate(0, 4)">
    <!-- Rounded square background -->
    <rect width="48" height="48" rx="12" fill="#2563eb"/>
    <!-- Heart shape with pulse line -->
    <path d="M24 38c-0.5-0.3-12-7.5-12-16 0-4.5 3.5-8 7.5-8 2.5 0 4 1.2 4.5 1.8C24.5 15.2 26 14 28.5 14c4 0 7.5 3.5 7.5 8 0 8.5-11.5 15.7-12 16z" fill="white" opacity="0.3"/>
    <path d="M12 26h6l3-6 3 10 3-8 3 4h6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- "Viver" text -->
  <text x="60" y="30" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2563eb" letter-spacing="-0.5">Viver</text>
  <!-- "Saude" text -->
  <text x="60" y="50" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#54d8bc" letter-spacing="-0.5">Saude</text>
</svg>