<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <linearGradient id="diamante-g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="diamante-g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="50%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="diamante-shine" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Left arm of V -->
  <polygon points="20,10 100,170 70,170 5,40" fill="url(#diamante-g1)"/>
  <polygon points="20,10 55,10 100,130 100,170" fill="url(#diamante-g2)"/>
  <!-- Right arm of V -->
  <polygon points="180,10 100,170 130,170 195,40" fill="url(#diamante-g2)"/>
  <polygon points="180,10 145,10 100,130 100,170" fill="url(#diamante-g1)"/>
  <!-- Facet highlights -->
  <polygon points="20,10 55,10 38,40" fill="url(#diamante-shine)"/>
  <polygon points="180,10 145,10 162,40" fill="url(#diamante-shine)"/>
  <polygon points="55,10 100,130 38,40" fill="#38bdf8" opacity="0.3"/>
  <polygon points="145,10 100,130 162,40" fill="#22d3ee" opacity="0.2"/>
  <!-- Extra sparkle for diamond -->
  <polygon points="95,50 100,35 105,50 100,55" fill="white" opacity="0.6"/>
</svg>
